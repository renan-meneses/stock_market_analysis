apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace | default "financial-dashboard" }}
  labels:
    app: frontend
    {{- include "financial-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.servicePort }}
              name: http
          env:
            - name: BACKEND_API_BASE_URL
              value: {{ .Values.frontend.config.backendApiBaseUrl }}
            - name: AWESOME_API_BASE_URL
              value: {{ .Values.frontend.config.awesomeApiBaseUrl }}
            - name: BCB_API_BASE_URL
              value: {{ .Values.frontend.config.bcbApiBaseUrl }}
            - name: MARKET_REFRESH_INTERVAL_MS
              value: "{{ .Values.frontend.config.marketRefreshIntervalMs }}"
            - name: MACROECONOMIC_REFRESH_INTERVAL_MS
              value: "{{ .Values.frontend.config.macroeconomicRefreshIntervalMs }}"
            - name: REQUEST_TIMEOUT_MS
              value: "{{ .Values.frontend.config.requestTimeoutMs }}"
          resources:
            requests:
              cpu: {{ .Values.frontend.resources.requests.cpu }}
              memory: {{ .Values.frontend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.frontend.resources.limits.cpu }}
              memory: {{ .Values.frontend.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
