apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-api
  namespace: {{ .Values.global.namespace | default "financial-dashboard" }}
  labels:
    app: financial-api
spec:
  replicas: {{ .Values.backend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: financial-api
  template:
    metadata:
      labels:
        app: financial-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: financial-api
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.servicePort }}
              name: http
          env:
            - name: AWESOME_API_BASE_URL
              value: {{ .Values.backend.config.awesomeApiBaseUrl }}
            - name: BCB_API_BASE_URL
              value: {{ .Values.backend.config.bcbApiBaseUrl }}
            - name: REDIS_URL
              value: {{ .Values.backend.config.redisUrl }}
            - name: BRAPI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.externalSecretName }}
                  key: BRAPI_TOKEN
          resources:
            requests:
              cpu: {{ .Values.backend.resources.requests.cpu }}
              memory: {{ .Values.backend.resources.requests.memory }}
            limits:
              cpu: {{ .Values.backend.resources.limits.cpu }}
              memory: {{ .Values.backend.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
