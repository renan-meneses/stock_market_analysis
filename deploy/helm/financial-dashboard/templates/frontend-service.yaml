apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.global.namespace | default "financial-dashboard" }}
  labels:
    app: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.servicePort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: frontend
