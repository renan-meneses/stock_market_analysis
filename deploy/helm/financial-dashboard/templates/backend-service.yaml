apiVersion: v1
kind: Service
metadata:
  name: financial-api
  namespace: {{ .Values.global.namespace | default "financial-dashboard" }}
  labels:
    app: financial-api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.servicePort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: financial-api
