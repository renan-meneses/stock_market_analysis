<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Stock Market Dashboard</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #f0f2f5;
      --bg-subtle: #f9fafb;
      --card-bg: #ffffff;
      --border-color: #e5e7eb;
      --text-primary: #1a1a2e;
      --text-secondary: #6b7280;
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --primary-light: #e0e7ff;
      --tag-bg: #f3f4f6;
    }
    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-subtle: #1e293b;
      --card-bg: #1e293b;
      --border-color: #334155;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --primary: #818cf8;
      --primary-dark: #6366f1;
      --primary-light: #312e81;
      --tag-bg: #334155;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; color: var(--text-primary); background: var(--bg-primary); }
  </style>
</head>

</body>
</html>
