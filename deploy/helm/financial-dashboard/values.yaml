global:
  namespace: financial-dashboard

frontend:
  image:
    repository: stock-market-dashboard/frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  servicePort: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  config:
    backendApiBaseUrl: http://financial-api:8000/api
    awesomeApiBaseUrl: https://economia.awesomeapi.com.br/json
    bcbApiBaseUrl: https://api.bcb.gov.br
    marketRefreshIntervalMs: 3000
    macroeconomicRefreshIntervalMs: 21600000
    requestTimeoutMs: 10000
    enableMockApi: false

backend:
  image:
    repository: stock-market-dashboard/financial-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  servicePort: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    awesomeApiBaseUrl: https://economia.awesomeapi.com.br/json
    bcbApiBaseUrl: https://api.bcb.gov.br
    redisUrl: redis://redis:6379/0
  externalSecretName: financial-api-secrets

redis:
  enabled: true
  image: redis:7-alpine
  servicePort: 6379

ingress:
  enabled: true
  hostname: dashboard.example.com
  tlsSecretName: dashboard-tls
  ingressClassName: nginx

autoscaling:
  frontend:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
  backend:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80

securityContext:
  runAsNonRoot: true
  runAsUser: 101
